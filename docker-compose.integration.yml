services:
  postgres:
    image: postgres:16.13-alpine
    environment:
      POSTGRES_USER: secondcontext
      POSTGRES_PASSWORD: secondcontext
      POSTGRES_DB: secondcontext_integration
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secondcontext -d secondcontext_integration"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "${INTEGRATION_POSTGRES_PORT:-55432}:5432"

  qdrant:
    image: qdrant/qdrant:v1.15.5
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': >/dev/tcp/127.0.0.1/6333'"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "${INTEGRATION_QDRANT_PORT:-56333}:6333"
